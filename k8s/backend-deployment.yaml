# Kubernetes Deployment for Interior Design AI Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designika-backend
  namespace: designika
  labels:
    app: designika-backend
    version: v2.1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: designika-backend
  template:
    metadata:
      labels:
        app: designika-backend
    spec:
      containers:
        - name: backend
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/designika-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: designika-secrets
            - configMapRef:
                name: designika-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: designika-backend-svc
  namespace: designika
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: designika-backend
---
# Ingress (ALB)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: designika-ingress
  namespace: designika
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERTIFICATE_ARN}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  rules:
    - host: api.designika.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: designika-backend-svc
                port:
                  number: 80
---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: designika-config
  namespace: designika
data:
  TEMPORAL_HOST: "temporal.designika.svc.cluster.local:7233"
  REDIS_URL: "redis://redis.designika.svc.cluster.local:6379"
  POSTGRES_HOST: "postgres.designika.svc.cluster.local"
  MONGO_URL: "mongodb://mongo.designika.svc.cluster.local:27017"
  MILVUS_URI: "http://milvus.designika.svc.cluster.local:19530"
  NEO4J_URI: "bolt://neo4j.designika.svc.cluster.local:7687"
---
# Secrets (placeholder - use External Secrets Operator in production)
apiVersion: v1
kind: Secret
metadata:
  name: designika-secrets
  namespace: designika
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  REPLICATE_API_TOKEN: "${REPLICATE_API_TOKEN}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
  SECRET_KEY: "${SECRET_KEY}"
