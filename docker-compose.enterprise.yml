version: '3.8'

services:
  # --- 1. The "Big 5" Databases ---

  # Primary Data (Users, Orders)
  postgres:
    image: postgres:15-alpine
    container_name: enterprise-postgres
    restart: always
    environment:
      POSTGRES_USER: designika_admin
      POSTGRES_PASSWORD: designika_password
      POSTGRES_DB: designika_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Logs & Agent Thoughts
  mongo:
    image: mongo:6.0
    container_name: enterprise-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: always
    ports:
      - "6379:6379"

  # Vector Database (Memory/RAG) - Standalone Mode
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: enterprise-milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - "etcd"
      - "minio"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  # Graph Database (Memory Relationships)
  neo4j:
    image: neo4j:5.15
    container_name: enterprise-neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/designika_graph
    volumes:
      - neo4j_data:/data

  # --- Support Services for Milvus ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - "ETCD_AUTO_COMPACTION_MODE=revision"
      - "ETCD_AUTO_COMPACTION_RETENTION=1000"
      - "ETCD_QUOTA_BACKEND_BYTES=4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # --- 2. Security & Auth ---

  # Keycloak (Identity Provider)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: enterprise-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # Vault (Secrets Management)
  vault:
    image: vault:1.13.3
    container_name: enterprise-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  # --- 3. Orchestration ---

  # Temporal (Async Workflows)
  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: enterprise-temporal
    ports:
      - "7233:7233" # gRPC
      - "8081:8080" # UI
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=designika_admin
      - POSTGRES_PWD=designika_password
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres

  # --- 4. Ingress ---

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: enterprise-ingress
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - keycloak
      # - api (When we containerize the backend)

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  milvus_data:
