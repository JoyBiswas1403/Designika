services:
  postgres:
    image: postgres:16-alpine
    container_name: interior-design-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interior_design
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interior-design-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: interior-design-backend
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/interior_design
      # - REDIS_URL=redis://redis:6379
      - SECRET_KEY=dev-secret-key-change-in-production
      # - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN} 
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy

  frontend:
    build: ./frontend
    container_name: interior-design-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
